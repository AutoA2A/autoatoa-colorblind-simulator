<div class="main-content">
    <section class="card">
        <div class="container">
            <h2 class="mb-4">模拟结果</h2>

            <!-- 图片对比区 -->
            <div class="grid" style="display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;">
                <figure style="flex:1 1 300px;max-width:45%;">
                    <img id="originalImg" src="" alt="原图" style="width:100%;border-radius:4px;">
                    <figcaption style="text-align:center;margin-top:0.5rem;">原图</figcaption>
                </figure>
                <figure style="flex:1 1 300px;max-width:45%;">
                    <canvas id="simCanvas" style="width:100%;border-radius:4px;"></canvas>
                    <figcaption style="text-align:center;margin-top:0.5rem;">模拟图 (<span id="modeLabel">正常视力</span>)</figcaption>
                </figure>
            </div>

            <!-- 操作按钮 -->
            <div style="margin-top:1.5rem;text-align:center;">
                <button class="btn btn-primary" id="downloadBtn">下载模拟图</button>
                <button class="btn btn-secondary" id="shareBtn">分享</button>
                <a href="upload.html" class="btn btn-secondary" style="margin-left:0.5rem;">重新上传</a>
            </div>

            <!-- 色盲模式切换 -->
            <div style="margin-top:2rem;">
                <h3>切换色盲模式</h3>
                <div class="main-nav" style="justify-content:center;flex-wrap:wrap;">
                    <a href="#" class="btn btn-secondary" data-mode="normal">正常视力</a>
                    <a href="#" class="btn btn-secondary" data-mode="protanopia">红色盲 (Protanopia)</a>
                    <a href="#" class="btn btn-secondary" data-mode="deuteranopia">绿色盲 (Deuteranopia)</a>
                    <a href="#" class="btn btn-secondary" data-mode="tritanopia">蓝色盲 (Tritanopia)</a>
                </div>
            </div>
        </div>

</div>

<script>
(function(){
    // 读取图片 ID 参数
    const params = new URLSearchParams(window.location.search);
    const imgId = params.get('id');
    if (!imgId) {
        document.getElementById('originalImg').alt = '未提供图片 ID';
        return;
    }
    const imgUrl = `uploads/${imgId}.png`; // 假设上传后存放路径
    const originalImg = document.getElementById('originalImg');
    originalImg.src = imgUrl;

    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const modeLabel = document.getElementById('modeLabel');

    // 色盲模拟矩阵
    const matrices = {
        normal:      [1,0,0, 0,1,0, 0,0,1],
        protanopia:  [0.567,0.433,0, 0.558,0.442,0, 0,0.242,0.758],
        deuteranopia:[0.625,0.375,0, 0.7,0.3,0, 0,0.3,0.7],
        tritanopia:  [0.95,0.05,0, 0,0.433,0.567, 0,0.475,0.525]
    };

    function applyMatrix(imageData, matrix){
        const data = imageData.data;
        for(let i=0;i<data.length;i+=4){
            const r=data[i], g=data[i+1], b=data[i+2];
            data[i]   = r*matrix[0] + g*matrix[1] + b*matrix[2];
            data[i+1] = r*matrix[3] + g*matrix[4] + b*matrix[5];
            data[i+2] = r*matrix[6] + g*matrix[7] + b*matrix[8];
        }
    }

    function render(mode){
        const matrix = matrices[mode] || matrices.normal;
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function(){
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img,0,0);
            const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
            applyMatrix(imgData,matrix);
            ctx.putImageData(imgData,0,0);
            modeLabel.textContent = {
                normal:'正常视力',
                protanopia:'红色盲',
                deuteranopia:'绿色盲',
                tritanopia:'蓝色盲'
            }[mode]||'正常视力';
        };
        img.src = imgUrl;
    }

    // 初始渲染
    render('normal');

    // 模式切换
    document.querySelectorAll('.main-nav a[data-mode]').forEach(a=>{
        a.addEventListener('click',e=>{
            e.preventDefault();
            const mode=e.currentTarget.getAttribute('data-mode');
            render(mode);
        });
    });

    // 下载
    document.getElementById('downloadBtn').addEventListener('click',()=>{
        canvas.toBlob(blob=>{
            const a=document.createElement('a');
            a.href=URL.createObjectURL(blob);
            a.download=`${imgId}_${modeLabel.textContent}.png`;
            a.click();
            URL.revokeObjectURL(a.href);
        });
    });

    // 分享（使用 Web Share API，若不支持则 fallback）
    document.getElementById('shareBtn').addEventListener('click',()=>{
        canvas.toBlob(blob=>{
            const file=new File([blob], `${imgId}_${modeLabel.textContent}.png`,{type:'image/png'});
            if (navigator.canShare && navigator.canShare({files:[file]})){
                navigator.share({
                    title:'色盲模拟图',
                    files:[file]
                }).catch(()=>{});
            }else{
                // fallback: copy link
                const link=document.createElement('input');
                link.value=window.location.href;
                document.body.appendChild(link);
                link.select();
                document.execCommand('copy');
                document.body.removeChild(link);
                alert('链接已复制到剪贴板');
            }
        });
    });
})();
</script>
