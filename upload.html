<main class="main-content">
    <div class="container">
        <article class="card">
            <h2>上传图片</h2>
            <form id="uploadForm">
                <div>
                    <input type="file" id="imageFile" accept="image/*">
                    <input type="text" id="imageUrl" placeholder="或粘贴图片网址">
                </div>
                <div>
                    <label><input type="radio" name="colorMode" value="achromatopsia"> 全色盲</label>
                    <label><input type="radio" name="colorMode" value="protanopia"> 红-绿（红色盲）</label>
                    <label><input type="radio" name="colorMode" value="tritanopia"> 蓝-黄（蓝色盲）</label>
                </div>
                <button type="submit" class="btn btn-primary">开始模拟</button>
            </form>
        </article>
    </div>
</main>

<script>
    document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const fileInput = document.getElementById('imageFile');
        const urlInput = document.getElementById('imageUrl');
        const colorMode = document.querySelector('input[name="colorMode"]:checked');
        
        if (!colorMode) {
            alert('请选择色盲模式');
            return;
        }
        
        let imageBase64;
        const reader = new FileReader();
        
        reader.onload = function(event) {
            imageBase64 = event.target.result;
            const mode = colorMode.value;
            window.location.href = `result.html?image=${encodeURIComponent(imageBase64)}&mode=${mode}`;
        };
        
        if (fileInput.files.length > 0) {
            reader.readAsDataURL(fileInput.files[0]);
        } else if (urlInput.value) {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                imageBase64 = canvas.toDataURL();
                const mode = colorMode.value;
                window.location.href = `result.html?image=${encodeURIComponent(imageBase64)}&mode=${mode}`;
            };
            img.src = urlInput.value;
        } else {
            alert('请选择图片或输入图片网址');
        }
    });
</script>
